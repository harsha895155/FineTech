<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions | FintechPro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/transactions.css">
    <link rel="stylesheet" href="/css/animations.css">
</head>
<body class="creative-mode">
    <button class="mobile-nav-toggle" id="sidebarToggle" onclick="toggleSidebar()">
        ☰
    </button>

    <div class="sidebar" id="sidebar">
        <div class="logo-wrapper">
            <div class="logo-icon">
                <span class="logo-icon-inner">F</span>
            </div>
            <span class="logo-text">FINTECH<span class="text-gradient-creative">PRO</span></span>
        </div>
        
        <a href="/views/dashboard.html" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span>Dashboard</span>
        </a>
        <a href="/views/expenses.html" class="nav-item">
            <span class="nav-icon">💸</span>
            <span>Expenses</span>
        </a>
        <a href="/views/transfer.html" class="nav-item">
            <span class="nav-icon">📤</span>
            <span>Transfer</span>
        </a>
        <a href="/views/transactions.html" class="nav-item active">
            <span class="nav-icon">📋</span>
            <span>Transactions</span>
        </a>
        <a href="/views/reports.html" class="nav-item">
            <span class="nav-icon">📊</span>
            <span>Reports</span>
        </a>
        <a href="/views/admin.html" id="adminNavItem" class="nav-item hide">
            <span class="nav-icon">🛡️</span>
            <span>Admin</span>
        </a>
        <a href="/views/profile.html" class="nav-item">
            <span class="nav-icon">👤</span>
            <span>Profile</span>
        </a>
        <a href="/views/settings.html" class="nav-item">
            <span class="nav-icon">⚙️</span>
            <span>Settings</span>
        </a>
        <a href="/views/support.html" class="nav-item">
            <span class="nav-icon">🎧</span>
            <span>Support</span>
        </a>
        
        <div class="flex-1"></div>
        
        <a href="#" onclick="handleLogout()" class="nav-item margin-b-0">
            <span class="nav-icon">🚪</span>
            <span>Logout</span>
        </a>
    </div>

    <main class="content">
        <header class="header-main">
            <div>
                <h1 class="header-title">Recent <span class="text-gradient">Transactions</span></h1>
                <p class="header-description">Comprehensive financial history in real-time.</p>
            </div>
            <a href="/views/profile.html">
                <div id="headerAvatar" class="sidebar-user-avatar">U</div>
            </a>
        </header>

        <div class="filter-row margin-b-2">
            <button id="filter-all" class="filter-btn active" onclick="setFilter('all')">All</button>
            <button id="filter-income" class="filter-btn" onclick="setFilter('income')">Income</button>
            <button id="filter-expense" class="filter-btn" onclick="setFilter('expense')">Expenses</button>
        </div>

        <div class="table-container">
            <table class="table-main-full">
                <thead>
                    <tr class="table-head-row">
                        <th class="table-head-cell trans-table-head-cell">DATE</th>
                        <th class="table-head-cell trans-table-head-cell">DESC</th>
                        <th class="table-head-cell trans-table-head-cell">TYPE</th>
                        <th class="table-head-cell trans-table-head-cell text-right">AMOUNT</th>
                    </tr>
                </thead>
                <tbody id="transBody">
                    <!-- Dynamic Content -->
                </tbody>
            </table>
            <div id="emptyState" class="empty-state hide">
                <p>No transactions found for this filter.</p>
            </div>
        </div>
    </main>

    <script>
        let currentFilter = 'all';

        function setFilter(type) {
            currentFilter = type;
            
            // UI Updates
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`filter-${type}`).classList.add('active');
            
            renderTransactions();
        }

        async function renderTransactions() {
            const tableBody = document.getElementById('transBody');
            const emptyState = document.getElementById('emptyState');
            const token = localStorage.getItem('fintech_token');
            if (!token) return;

            try {
                const [expRes, incRes, transferRes] = await Promise.all([
                    fetch('/api/expenses', { headers: { 'Authorization': `Bearer ${token}` } }),
                    fetch('/api/income', { headers: { 'Authorization': `Bearer ${token}` } }),
                    fetch('/api/transfer/history', { headers: { 'Authorization': `Bearer ${token}` } })
                ]);

                const expResult = await expRes.json();
                const incResult = await incRes.json();
                const transferResult = await transferRes.json();

                if (expResult.success && incResult.success) {
                    const rawExpenses = expResult.data;
                    const rawIncomes = incResult.data;
                    const rawTransfers = transferResult.success ? transferResult.data : [];

                    const expenseData = rawExpenses.map(e => ({
                        date: e.date ? new Date(e.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : 'N/A',
                        rawDate: e.date,
                        merchant: e.title,
                        category: e.category,
                        amount: e.amount,
                        type: 'expense'
                    }));

                    const incomeData = rawIncomes.map(i => ({
                        date: i.date ? new Date(i.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : 'N/A',
                        rawDate: i.date,
                        merchant: i.source,
                        category: i.category,
                        amount: i.amount,
                        type: 'income'
                    }));

                    const transferData = rawTransfers.map(t => ({
                        date: t.date ? new Date(t.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : 'N/A',
                        rawDate: t.date,
                        merchant: (t.type === 'debit' ? 'Sent to ' : 'Received from ') + t.otherParty,
                        category: t.description || 'Internal Transfer',
                        amount: t.amount,
                        type: t.type === 'debit' ? 'expense' : 'income'
                    }));

            let combined = [...incomeData, ...expenseData, ...transferData].sort((a, b) => new Date(b.rawDate) - new Date(a.rawDate));

            // Filtering
            if (currentFilter === 'income') {
                combined = combined.filter(t => t.type === 'income');
            } else if (currentFilter === 'expense') {
                combined = combined.filter(t => t.type === 'expense');
            }


                    // Rendering
                    tableBody.innerHTML = '';
                    if (combined.length === 0) {
                        emptyState.classList.remove('hide');
                    } else {
                        emptyState.classList.add('hide');
                        combined.forEach(t => {
                            const isIncome = t.type === 'income';
                            const sign = isIncome ? '+' : '-';
                            const amount = '₹' + t.amount.toLocaleString('en-IN');

                            const row = `
                                <tr class="trans-table-row">
                                    <td class="trans-table-cell"><span class="trans-date-text">${t.date}</span></td>
                                    <td class="trans-table-cell"><p class="trans-merchant-name">${t.merchant}</p></td>
                                    <td class="trans-table-cell"><span class="trans-category-tag">${t.category}</span></td>
                                    <td class="trans-table-cell trans-amount-text ${(isIncome ? 'text-income' : 'text-expense')}">
                                        ${sign}${amount}
                                    </td>
                                </tr>
                            `;
                            tableBody.insertAdjacentHTML('beforeend', row);
                        });
                    }
                }
            } catch (err) {
                console.error('Failed to load transactions:', err);
                tableBody.innerHTML = '<tr><td colspan="4" class="table-empty-row text-error-accent">Error loading data from server.</td></tr>';
            }
        }

        // Init
        window.onload = async () => {
            const loggedInUser = JSON.parse(localStorage.getItem('fintech_logged_in_user'));
            if (!loggedInUser) {
                window.location.href = '/views/portal.html';
                return;
            }

            await renderTransactions();
            
            // Avatar Logic
            const avatar = document.getElementById('headerAvatar');
            const savedPhoto = localStorage.getItem('fintech_profile_pic');
            const userInitial = (loggedInUser.fullName || loggedInUser.name || 'U').charAt(0).toUpperCase();

            if (savedPhoto && savedPhoto.startsWith('data:image')) {
                avatar.style.backgroundImage = `url(${savedPhoto})`;
                avatar.classList.add('has-photo');
                avatar.textContent = '';
            } else {
                avatar.classList.remove('has-photo');
                avatar.style.backgroundImage = 'none';
                avatar.textContent = userInitial;
            }
            
            // RBAC
            const userRole = (loggedInUser.role) ? loggedInUser.role.toLowerCase() : '';
            const adminLink = document.getElementById('adminNavItem');
            if (adminLink) {
                if (userRole === 'administrator' || userRole === 'admin') {
                    adminLink.classList.remove('hide');
                } else {
                    adminLink.classList.add('hide');
                }
            }
        };
        function handleLogout() {
            // Check if this is an admin-impersonated session
            const adminToken = localStorage.getItem('fintech_admin_token');
            const adminUser = localStorage.getItem('fintech_admin_user');
            
            if (adminToken && adminUser) {
                // Restore admin session
                localStorage.setItem('fintech_token', adminToken);
                localStorage.setItem('fintech_logged_in_user', adminUser);
                localStorage.removeItem('fintech_admin_token');
                localStorage.removeItem('fintech_admin_user');
                window.location.href = '/views/admin.html';
            } else {
                localStorage.removeItem('fintech_token');
                localStorage.removeItem('fintech_logged_in_user');
                localStorage.removeItem('fintech_current_prefix');
                window.location.href = '/index.html';
            }
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            if (!sidebar) return;
            sidebar.classList.toggle('active');
            const btn = document.getElementById('sidebarToggle');
            if (btn) btn.innerHTML = sidebar.classList.contains('active') ? '✕' : '☰';
        }

        // Close sidebar when clicking outside on mobile
        document.addEventListener('click', (e) => {
            const sidebar = document.getElementById('sidebar');
            const btn = document.getElementById('sidebarToggle');
            if (window.innerWidth <= 1024 && 
                sidebar && sidebar.classList.contains('active') && 
                !sidebar.contains(e.target) && 
                e.target !== btn) {
                toggleSidebar();
            }
        });
    </script>
</body>
</html>
