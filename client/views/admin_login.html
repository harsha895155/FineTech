<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | FintechPro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/admin_login.css">
</head>
<body>

    <div class="login-container">
        <div class="text-center">
            <div class="admin-badge">ADMINISTRATION PORTAL</div>
            <h1 class="auth-header-title">System Access</h1>
            <p class="auth-header-subtitle">Enter your credentials to access the admin dashboard.</p>
        </div>

        <div id="error-box" class="error-message hide"></div>

        <form id="admin-login-form" onsubmit="handleAdminLogin(event)">
            <div class="form-group">
                <label for="adminEmail" class="form-label">Admin Email</label>
                <input type="email" id="adminEmail" name="email" class="form-input" placeholder="admin@fintech.pro" required>
            </div>
            
            <div class="form-group">
                <label for="adminPass" class="form-label">Password</label>
                <input type="password" id="adminPass" name="password" class="form-input" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-submit" id="btn-text">Authenticate</button>
        </form>

        <div class="text-center margin-t-2">
            <a href="/" class="return-link">← Return to Homepage</a>
        </div>
    </div>

    <script>
        async function handleAdminLogin(e) {
            e.preventDefault();
            const form = e.target;
            const email = form.email.value;
            const password = form.password.value;
            const btn = document.querySelector('.btn-submit');
            const errorBox = document.getElementById('error-box');

            // Reset state
            errorBox.classList.add('hide');
            errorBox.classList.remove('show-block');
            btn.innerHTML = 'Verifying...';
            btn.disabled = true;
            btn.classList.add('btn-disabled');

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        email, 
                        password,
                        role: 'admin' // Force role check on server
                    })
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    // Double check (redundant but safe)
                    const userRole = result.data.role.toLowerCase();
                    if (userRole !== 'admin' && userRole !== 'administrator') {
                        throw new Error('Access Denied. Not an authorized administrator account.');
                    }

                    // Store session
                    localStorage.setItem('token', result.data.token);
                    localStorage.setItem('fintech_token', result.data.token);
                    localStorage.setItem('fintech_logged_in_user', JSON.stringify(result.data));

                    // Redirect
                    window.location.href = '/views/admin.html'; // Assuming this exists or will correspond to dashboard
                } else {
                    throw new Error(result.message || 'Authentication failed');
                }
            } catch (err) {
                console.error(err);
                errorBox.textContent = err.message;
                errorBox.classList.add('show-block');
                errorBox.classList.remove('hide');
                btn.innerHTML = 'Authenticate';
                btn.disabled = false;
                btn.classList.remove('btn-disabled');
            }
        }
    </script>
</body>
</html>
